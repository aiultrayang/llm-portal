<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的工具门户</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            min-height: 100vh;
        }

        .header {
            padding: 50px 20px 30px;
            text-align: center;
        }

        .logo {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(90deg, #00d4ff, #7c3aed, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .tagline {
            font-size: 18px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 2px;
        }

        .search-section {
            max-width: 700px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .search-box {
            display: flex;
            background: rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 6px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .search-input {
            flex: 1;
            padding: 16px 28px;
            background: transparent;
            border: none;
            font-size: 16px;
            color: #fff;
            outline: none;
        }

        .search-input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .search-btn {
            padding: 16px 32px;
            background: linear-gradient(90deg, #7c3aed, #00d4ff);
            border: none;
            border-radius: 50px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .search-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.4);
        }

        .quick-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px auto;
            padding: 0 20px;
            flex-wrap: wrap;
        }

        .quick-item {
            padding: 12px 24px;
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .quick-item:hover, .quick-item.active {
            background: rgba(255,255,255,0.15);
            color: #fff;
            border-color: rgba(255,255,255,0.3);
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border-color: rgba(255,255,255,0.2);
        }

        .card-gradient {
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            position: relative;
            overflow: hidden;
        }

        .card.ai .card-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .card.tools .card-gradient {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .card.news .card-gradient {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .card:hover .card-gradient::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            100% { left: 100%; }
        }

        .card-body {
            padding: 24px;
        }

        .card-tag {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .card-desc {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .card-action {
            font-size: 14px;
            color: #00d4ff;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card:hover .card-action {
            text-shadow: 0 0 20px rgba(0,212,255,0.5);
        }

        .footer {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
        }

        .hot-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            background: linear-gradient(90deg, #ff416c, #ff4b2b);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            z-index: 1;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.5);
        }

        .no-results-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">🚀 我的工具门户</div>
        <div class="tagline">发现 · 探索 · 创造</div>
    </header>

    <div class="search-section">
        <div class="search-box">
            <input type="text" class="search-input" placeholder="搜索系统名称、描述或标签..." id="searchInput">
            <button class="search-btn">搜索</button>
        </div>
    </div>

    <div class="quick-nav">
        <div class="quick-item active" data-filter="all">🌟 全部</div>
        <div class="quick-item" data-filter="ai">🤖 AI工具</div>
        <div class="quick-item" data-filter="tools">⚡ 效率工具</div>
        <div class="quick-item" data-filter="news">📰 技术资讯</div>
    </div>

    <main class="main-content" id="mainContent">
        <!-- 内容由JavaScript动态加载 -->
    </main>

    <footer class="footer">
        © 2024 我的工具门户 · v1.0.0
    </footer>

    <script>
        // 配置数据 - 可从 config.json 加载或直接修改此处
        const CONFIG = {
            portal: {
                title: "我的工具门户",
                tagline: "发现 · 探索 · 创造",
                version: "1.0.0"
            },
            categories: [
                { id: "ai", name: "AI工具", icon: "🤖" },
                { id: "tools", name: "效率工具", icon: "⚡" },
                { id: "news", name: "技术资讯", icon: "📰" }
            ],
            systems: [
                {
                    id: "chatbot",
                    name: "AI 对话助手",
                    icon: "🤖",
                    description: "智能对话与创作平台，支持多轮对话、文档分析、代码生成等功能，是你得力的AI助手。",
                    category: "ai",
                    url: "#chatbot",  // 修改为实际URL
                    hot: true
                },
                {
                    id: "image-gen",
                    name: "图像生成器",
                    icon: "🎨",
                    description: "AI驱动的图像创作工具，输入文字描述即可生成高质量图片，支持多种风格和尺寸。",
                    category: "ai",
                    url: "#image-gen",
                    hot: false
                },
                {
                    id: "translator",
                    name: "智能翻译",
                    icon: "🌐",
                    description: "多语言实时翻译服务，支持100+种语言互译，专业领域术语翻译更准确。",
                    category: "ai",
                    url: "#translator",
                    hot: false
                },
                {
                    id: "converter",
                    name: "格式转换工具",
                    icon: "⚡",
                    description: "支持PDF、Word、Excel、图片等多种格式的在线转换，快速高效，无需安装软件。",
                    category: "tools",
                    url: "#converter",
                    hot: false
                },
                {
                    id: "dashboard",
                    name: "数据看板",
                    icon: "📊",
                    description: "可视化数据分析平台，拖拽式创建仪表盘，实时监控业务指标，支持多种图表类型。",
                    category: "tools",
                    url: "#dashboard",
                    hot: false
                },
                {
                    id: "snippets",
                    name: "代码片段库",
                    icon: "💻",
                    description: "开发代码管理工具，保存、分类、搜索常用代码片段，支持多语言语法高亮。",
                    category: "tools",
                    url: "#snippets",
                    hot: false
                },
                {
                    id: "tech-news",
                    name: "IT技术资讯",
                    icon: "📰",
                    description: "最新科技新闻聚合，汇集国内外技术博客、行业动态，每日更新，助你紧跟技术趋势。",
                    category: "news",
                    url: "#tech-news",
                    hot: false
                },
                {
                    id: "weekly",
                    name: "开源周报",
                    icon: "📝",
                    description: "每周开源项目精选，发现GitHub热门项目、优质开源工具，附带深度解读和使用指南。",
                    category: "news",
                    url: "#weekly",
                    hot: false
                }
            ]
        };

        // 渲染页面
        function renderPortal(config) {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = '';

            // 热门系统
            const hotSystems = config.systems.filter(s => s.hot);
            if (hotSystems.length > 0) {
                const hotSection = createSection('🔥 热门推荐', hotSystems);
                mainContent.appendChild(hotSection);
            }

            // 按分类渲染
            config.categories.forEach(cat => {
                const catSystems = config.systems.filter(s => s.category === cat.id && !s.hot);
                if (catSystems.length > 0) {
                    const section = createSection(cat.icon + ' ' + cat.name, catSystems);
                    section.dataset.category = cat.id;
                    mainContent.appendChild(section);
                }
            });
        }

        function createSection(title, systems) {
            const section = document.createElement('div');
            section.className = 'section';

            const titleEl = document.createElement('div');
            titleEl.className = 'section-title';
            titleEl.textContent = title;
            section.appendChild(titleEl);

            const grid = document.createElement('div');
            grid.className = 'cards-grid';

            systems.forEach(sys => {
                const card = document.createElement('a');
                card.className = `card ${sys.category}`;
                card.href = sys.url;
                card.target = '_blank';  // 新标签页打开
                card.dataset.category = sys.category;
                card.dataset.name = sys.name.toLowerCase();
                card.dataset.desc = sys.description.toLowerCase();

                if (sys.hot) {
                    card.innerHTML = `<span class="hot-badge">HOT</span>`;
                }

                card.innerHTML += `
                    <div class="card-gradient">${sys.icon}</div>
                    <div class="card-body">
                        <span class="card-tag">${getCategoryName(sys.category)}</span>
                        <h3 class="card-title">${sys.name}</h3>
                        <p class="card-desc">${sys.description}</p>
                        <div class="card-action">立即体验 →</div>
                    </div>
                `;

                grid.appendChild(card);
            });

            section.appendChild(grid);
            return section;
        }

        function getCategoryName(catId) {
            const cat = CONFIG.categories.find(c => c.id === catId);
            return cat ? cat.name : catId;
        }

        // 搜索功能
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', handleSearch);

        function handleSearch() {
            const query = searchInput.value.toLowerCase().trim();
            const cards = document.querySelectorAll('.card');
            let hasResults = false;

            cards.forEach(card => {
                const name = card.dataset.name;
                const desc = card.dataset.desc;
                const category = card.dataset.category;

                if (query === '' || name.includes(query) || desc.includes(query) || category.includes(query)) {
                    card.style.display = 'block';
                    hasResults = true;
                } else {
                    card.style.display = 'none';
                }
            });

            // 显示/隐藏无结果提示
            showNoResults(!hasResults && query !== '');
        }

        function showNoResults(show) {
            const existing = document.querySelector('.no-results');
            if (existing) existing.remove();

            if (show) {
                const mainContent = document.getElementById('mainContent');
                const noResults = document.createElement('div');
                noResults.className = 'no-results';
                noResults.innerHTML = `
                    <div class="no-results-icon">🔍</div>
                    <p>未找到匹配的系统</p>
                    <p style="font-size: 12px; margin-top: 8px;">尝试其他关键词或查看全部</p>
                `;
                mainContent.appendChild(noResults);
            }
        }

        // 分类筛选
        const quickItems = document.querySelectorAll('.quick-item');
        quickItems.forEach(item => {
            item.addEventListener('click', function() {
                quickItems.forEach(i => i.classList.remove('active'));
                this.classList.add('active');

                const filter = this.dataset.filter;
                const sections = document.querySelectorAll('.section');
                const cards = document.querySelectorAll('.card');

                // 清除搜索
                searchInput.value = '';

                if (filter === 'all') {
                    sections.forEach(s => s.style.display = 'block');
                    cards.forEach(c => c.style.display = 'block');
                } else {
                    sections.forEach(s => {
                        if (s.dataset.category === filter || s.querySelector('.section-title').textContent.includes('热门')) {
                            s.style.display = 'block';
                        } else {
                            s.style.display = 'none';
                        }
                    });
                    cards.forEach(c => {
                        if (c.dataset.category === filter) {
                            c.style.display = 'block';
                        } else {
                            c.style.display = 'none';
                        }
                    });
                }
            });
        });

        // 初始化渲染
        renderPortal(CONFIG);
    </script>
</body>
</html>
