engine: vllm
version: "0.16.0"

common_params:
  - name: model
    type: string
    required: true
    group: basic
    description: "模型名称或路径"
  - name: tokenizer
    type: string
    default: null
    required: false
    group: basic
    description: "分词器名称或路径"
  - name: dtype
    type: string
    default: "auto"
    choices: ["auto", "float16", "bfloat16", "float32"]
    group: basic
    description: "数据类型"
  - name: trust_remote_code
    type: boolean
    default: false
    group: basic
    description: "是否信任远程代码"
  - name: max_tokens
    type: int
    default: 16
    min: 1
    group: inference
    description: "最大生成 token 数"
  - name: temperature
    type: float
    default: 1.0
    min: 0.0
    max: 2.0
    group: inference
    description: "温度参数"
  - name: top_p
    type: float
    default: 1.0
    min: 0.0
    max: 1.0
    group: inference
    description: "Top-p 采样参数"
  - name: top_k
    type: int
    default: -1
    min: -1
    group: inference
    description: "Top-k 采样参数，-1 表示禁用"
  - name: repetition_penalty
    type: float
    default: 1.0
    min: 1.0
    max: 2.0
    group: inference
    description: "重复惩罚系数"
  - name: host
    type: string
    default: "0.0.0.0"
    group: api
    description: "服务监听地址"
  - name: port
    type: int
    default: 8000
    min: 1
    max: 65535
    group: api
    description: "服务监听端口"
  - name: api_key
    type: string
    default: null
    group: api
    description: "API 密钥"

unique_params:
  - name: tensor_parallel_size
    type: int
    default: 1
    min: 1
    max: 8
    group: gpu
    description: "张量并行大小"
  - name: gpu_memory_utilization
    type: float
    default: 0.9
    min: 0.1
    max: 1.0
    group: gpu
    description: "GPU 显存利用率"
  - name: max_model_len
    type: int
    default: null
    min: 1
    group: gpu
    description: "模型最大上下文长度，默认自动检测"
  - name: kv_cache_dtype
    type: string
    default: "auto"
    choices: ["auto", "fp8", "fp8_e5m2", "fp8_e4m3"]
    group: performance
    description: "KV 缓存数据类型"
  - name: enable_prefix_caching
    type: boolean
    default: false
    group: performance
    description: "启用前缀缓存"
  - name: enable_chunked_prefill
    type: boolean
    default: false
    group: performance
    description: "启用分块预填充"
  - name: speculative_model
    type: string
    default: null
    group: advanced
    description: "推测解码模型路径"
  - name: quantization
    type: string
    default: null
    choices: ["awq", "gptq", "fp8", "bitsandbytes"]
    group: advanced
    description: "量化方法"
  - name: swap_space
    type: int
    default: 4
    min: 1
    max: 64
    group: advanced
    description: "CPU-GPU 交换空间大小 (GB)"

groups:
  basic: "基础参数"
  gpu: "GPU 参数"
  inference: "推理参数"
  performance: "性能参数"
  api: "API 参数"
  advanced: "高级参数"
